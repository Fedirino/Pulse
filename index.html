<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#070816" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Pulse</title>
<link rel="manifest" href="/manifest.json" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop stop-color='%23ff3df2'/%3E%3Cstop offset='1' stop-color='%2300e5ff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='%23070816'/%3E%3Cpath d='M10 36h10l5-12 8 26 6-18h16' stroke='url(%23g)' stroke-width='4.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
<style>
  :root{
    --bg:#050611; --bg-2:#0b1020; --panel:rgba(13,17,36,.86); --panel-2:rgba(20,26,50,.92);
    --line:rgba(126,143,255,.26); --text:#f4f7ff; --muted:#9ca6cd; --accent:#ff4bd8; --accent-2:#36f0ff;
    --accent-3:#8b5cf6; --warn:#ffcb6b; --bad:#ff6d86; --good:#4ef0b8;
    --radius:18px; --pad:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:
        radial-gradient(circle at 20% -10%, rgba(255,75,216,.22), transparent 30%),
        radial-gradient(circle at 80% 0%, rgba(54,240,255,.12), transparent 24%),
        radial-gradient(circle at 50% 120%, rgba(139,92,246,.16), transparent 28%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);color:var(--text);
      font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;
      overscroll-behavior-y:contain;-webkit-tap-highlight-color:transparent;}
  body{padding:env(safe-area-inset-top) env(safe-area-inset-right) calc(72px + env(safe-area-inset-bottom)) env(safe-area-inset-left);
      max-width:520px;margin:0 auto;position:relative;isolation:isolate}
    body::before{content:"";position:fixed;inset:0;background:
      linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size:24px 24px;mask-image:linear-gradient(180deg, rgba(0,0,0,.9), transparent 88%);pointer-events:none;opacity:.35;z-index:-2}
    body::after{content:"";position:fixed;inset:0;background:radial-gradient(circle at 50% 0%, rgba(255,75,216,.16), transparent 18%), radial-gradient(circle at 10% 10%, rgba(54,240,255,.10), transparent 16%), radial-gradient(circle at 90% 10%, rgba(139,92,246,.12), transparent 18%);pointer-events:none;z-index:-1;filter:blur(24px)}
  h1,h2,h3{margin:0;font-weight:600;letter-spacing:-.01em}
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;padding:0}
  input,textarea,select{font:inherit;color:inherit;background:var(--panel-2);
    border:1px solid var(--line);border-radius:10px;padding:10px 12px;width:100%;outline:none}
  input:focus,textarea:focus,select:focus{border-color:var(--accent)}
  /* Header */
  .topbar{display:flex;align-items:center;justify-content:space-between;
      padding:18px 16px 8px;position:sticky;top:0;z-index:30;backdrop-filter:blur(18px);background:linear-gradient(180deg, rgba(5,6,17,.92), rgba(5,6,17,.52));border-bottom:1px solid rgba(255,255,255,.05);box-shadow:0 8px 24px rgba(0,0,0,.18)}
  .greet{font-size:22px;font-weight:600}
  .greet small{display:block;color:var(--muted);font-weight:400;font-size:13px;margin-top:2px}
  .auth-btn{padding:8px 12px;border-radius:999px;background:linear-gradient(135deg, rgba(255,61,242,.12), rgba(0,229,255,.08));border:1px solid rgba(255,255,255,.1);
    font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px;box-shadow:0 0 0 1px rgba(255,61,242,.05), 0 14px 30px rgba(0,0,0,.22)}
  .auth-btn .dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
  .auth-btn.online .dot{background:var(--good)}
  /* Cards */
  .stack{display:flex;flex-direction:column;gap:12px;padding:6px 12px}
  .card{background:linear-gradient(180deg, rgba(20,24,48,.95), rgba(10,12,28,.95));border:1px solid rgba(126,143,255,.18);border-radius:var(--radius);
      padding:var(--pad);position:relative;overflow:hidden;box-shadow:0 12px 34px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.03)}
    .card::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:1px;background:linear-gradient(135deg, rgba(255,75,216,.28), rgba(54,240,255,.15), rgba(255,255,255,.02));-webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;opacity:.55}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .card-title{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:#b7bfdf}
  .card-action{font-size:13px;color:var(--accent-2);text-shadow:0 0 12px rgba(0,229,255,.24)}
  /* Weather */
  .wx-compact{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .wx-temp{font-size:46px;font-weight:300;letter-spacing:-.02em;line-height:1}
  .wx-meta{text-align:right;color:var(--muted);font-size:13px}
  .wx-meta b{display:block;color:var(--text);font-size:15px;margin-bottom:2px}
  .wx-icon{font-size:42px;line-height:1}
  .wx-expanded{display:none;margin-top:14px;border-top:1px solid var(--line);padding-top:12px}
  .card.open .wx-expanded{display:block}
  .wx-week{display:grid;grid-template-columns:repeat(10,minmax(58px,1fr));gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
  .wx-day{text-align:center;background:var(--panel-2);border-radius:10px;padding:8px 4px;font-size:11px;min-width:58px}
  .wx-day .wd{color:var(--muted)}
  .wx-day .we{font-size:18px;margin:2px 0}
  .wx-day .wt{font-weight:600;font-size:12px}
  .wx-day .wn{color:var(--muted);font-size:11px}
  .wx-hourly{margin-top:10px}
  .wx-hourly-label{font-size:12px;color:var(--muted);margin-bottom:6px}
  .wx-hours{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
  .wx-hour{min-width:64px;padding:8px 6px;border-radius:10px;background:var(--panel-2);border:1px solid rgba(255,255,255,.05);text-align:center}
  .wx-hour .t{font-size:11px;color:var(--muted)}
  .wx-hour .i{font-size:18px;line-height:1.2;margin:2px 0}
  .wx-hour .v{font-size:12px;font-weight:600}
  .wx-alerts{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .wx-alert{background:rgba(255,61,242,.10);color:#ffd0fb;border:1px solid rgba(255,61,242,.24);
    border-radius:999px;padding:6px 10px;font-size:11px;line-height:1.2}
  .wx-radar{aspect-ratio:16/10;background:#000;border-radius:12px;overflow:hidden;
    border:1px solid rgba(0,229,255,.16);margin-top:8px;box-shadow:0 0 0 1px rgba(255,61,242,.06), 0 0 24px rgba(0,229,255,.06)}
  .wx-radar iframe{width:100%;height:100%;border:0}
  /* Crypto */
  .crypto-list{display:flex;flex-direction:column;gap:8px}
  .crypto-row{display:flex;justify-content:space-between;gap:10px;align-items:center;background:linear-gradient(135deg, rgba(255,61,242,.08), rgba(0,229,255,.04));border-radius:12px;padding:10px 12px;border:1px solid rgba(255,255,255,.05)}
  .crypto-left{display:flex;align-items:center;gap:10px;min-width:0}
  .crypto-icon{width:22px;height:22px;border-radius:50%;flex:0 0 auto;background:#0d1220;box-shadow:0 0 0 1px rgba(0,229,255,.16), 0 0 12px rgba(255,61,242,.08)}
  .crypto-name{display:flex;flex-direction:column;gap:2px;min-width:0}
  .crypto-name b{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .crypto-name span{font-size:11px;color:var(--muted)}
  .crypto-price{display:flex;flex-direction:column;align-items:flex-end;gap:2px;font-variant-numeric:tabular-nums;flex:0 0 auto}
  .crypto-price b{font-size:14px}
  .crypto-price span{font-size:11px}
  .up{color:var(--good)}
  .down{color:var(--bad)}
  /* Calendar */
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .cal-nav{display:flex;gap:8px}
  .cal-nav button{width:28px;height:28px;border-radius:8px;background:var(--panel-2);color:var(--muted)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;font-size:12px}
  .cal-dow{color:var(--muted);text-align:center;padding:4px 0;font-size:11px}
  .cal-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;
    background:transparent;color:var(--text);position:relative;cursor:pointer}
  .cal-cell.dim{color:#3a4360}
  .cal-cell.today{background:linear-gradient(135deg, var(--accent), var(--accent-2));color:#070816;font-weight:700;box-shadow:0 8px 16px rgba(0,229,255,.15)}
  .cal-cell.has-event::after{content:"";position:absolute;bottom:4px;width:4px;height:4px;
    border-radius:50%;background:var(--accent-2)}
  .cal-cell.today.has-event::after{background:#001520}
  .cal-events{margin-top:10px;display:flex;flex-direction:column;gap:6px}
  .cal-event{display:flex;justify-content:space-between;gap:8px;background:var(--panel-2);
    padding:8px 10px;border-radius:10px;font-size:13px}
  .cal-event .when{color:var(--muted);font-size:12px}
  /* Notes */
  .notes-list{display:flex;flex-direction:column;gap:8px}
  .note{background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:10px 12px}
  .note textarea{background:transparent;border:0;padding:0;resize:none;width:100%;
    min-height:48px;font-size:14px;line-height:1.4}
  .note-foot{display:flex;justify-content:space-between;align-items:center;margin-top:6px;
    font-size:11px;color:var(--muted)}
  .note-del{color:var(--bad);font-size:12px}
  .add-row{display:flex;gap:8px;margin-top:10px}
  .add-row button{padding:10px 14px;border-radius:10px;background:linear-gradient(135deg, var(--accent), var(--accent-2));color:#07101b;
    font-weight:700;font-size:14px;box-shadow:0 8px 18px rgba(255,61,242,.14)}
  /* Alarms */
  .tabs{display:flex;gap:4px;background:rgba(255,255,255,.03);padding:4px;border-radius:10px;margin-bottom:10px;border:1px solid rgba(255,255,255,.05)}
  .tabs button{flex:1;padding:8px;border-radius:8px;font-size:13px;color:var(--muted)}
  .tabs button.active{background:linear-gradient(135deg, rgba(255,61,242,.18), rgba(0,229,255,.10));color:var(--text);box-shadow:0 0 0 1px rgba(0,229,255,.10) inset}
  .alarm-list{display:flex;flex-direction:column;gap:8px}
  .alarm{display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:linear-gradient(135deg, rgba(255,61,242,.05), rgba(0,229,255,.03));border-radius:12px;padding:10px 12px;border:1px solid rgba(255,255,255,.05)}
  .alarm .time{font-size:22px;font-weight:300}
  .alarm .label{color:var(--muted);font-size:12px}
  .alarm.off .time{color:var(--muted)}
  .switch{width:38px;height:22px;background:var(--line);border-radius:999px;position:relative;
    transition:background .15s;flex-shrink:0}
  .switch::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;
    background:#fff;transition:transform .15s}
  .switch.on{background:linear-gradient(135deg, var(--accent), var(--accent-2))}
  .switch.on::after{transform:translateX(16px)}
  .timer-display{font-size:54px;font-weight:200;text-align:center;letter-spacing:-.03em;
    font-variant-numeric:tabular-nums;margin:6px 0 12px}
  .timer-controls{display:flex;gap:8px;justify-content:center}
  .timer-controls button{padding:10px 18px;border-radius:10px;background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);font-size:14px}
  .timer-controls button.primary{background:linear-gradient(135deg, var(--accent), var(--accent-2));color:#07101b;border-color:transparent;font-weight:700}
  .timer-presets{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px}
  .timer-presets button{padding:8px;border-radius:8px;background:rgba(255,255,255,.04);font-size:12px;color:var(--muted);border:1px solid rgba(255,255,255,.05)}
  /* Shortcuts */
  .shortcuts{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .sc{aspect-ratio:1;background:linear-gradient(180deg, rgba(255,75,216,.10), rgba(54,240,255,.04));border:1px solid rgba(255,255,255,.09);border-radius:16px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
      text-decoration:none;color:var(--text);font-size:11px;text-align:center;padding:6px;box-shadow:0 10px 18px rgba(0,0,0,.18)}
  .sc .icon{font-size:26px;line-height:1;text-shadow:0 0 12px rgba(0,229,255,.18)}
  .sc .iconimg{width:42px;height:42px;display:block;object-fit:contain;filter:drop-shadow(0 0 10px rgba(54,240,255,.18)) drop-shadow(0 0 14px rgba(255,75,216,.14))}
  .sc.add{color:var(--muted);border-style:dashed}
  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:50;
    align-items:flex-end;justify-content:center;padding:16px}
  .modal-bg.open{display:flex}
  .modal{background:linear-gradient(180deg, rgba(19,23,46,.98), rgba(11,13,28,.98));border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);
    width:100%;max-width:480px;padding:18px;max-height:85vh;overflow:auto}
  .modal h3{margin-bottom:12px;font-size:17px}
  .modal-row{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
  .modal-row label{font-size:12px;color:var(--muted)}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
  .modal-actions button{padding:10px 16px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}
  .modal-actions button.primary{background:linear-gradient(135deg, var(--accent), var(--accent-2));color:#07101b;border-color:transparent;font-weight:700}
  /* Bottom nav */
  .nav{position:fixed;bottom:0;left:0;right:0;background:rgba(7,8,22,.88);
    backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,.08);
    display:flex;justify-content:space-around;padding:8px 8px calc(8px + env(safe-area-inset-bottom));
    z-index:40}
  .nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
    padding:6px;color:var(--muted);font-size:10px}
  .nav button.active{color:var(--accent-2);text-shadow:0 0 10px rgba(0,229,255,.22)}
  .nav .ic{font-size:20px}
  /* Sections */
  .section{display:none}
  .section.active{display:block}
  .empty{color:var(--muted);text-align:center;padding:18px 8px;font-size:13px}
  .version{text-align:center;color:#6e779d;font-size:11px;padding:14px 0 4px;letter-spacing:.04em}
</style>
</head>
<body>

<header class="topbar">
  <div class="greet" id="greet">Hello<small id="greetSub">Loading…</small></div>
  <button class="auth-btn" id="authBtn"><span class="dot"></span><span id="authLabel">Local</span></button>
</header>

<!-- HOME -->
<main class="section active stack" id="sec-home">

  <!-- Weather -->
  <div class="card" id="wxCard">
    <div class="card-head">
      <div class="card-title">Weather</div>
      <button class="card-action" id="wxToggle">Expand</button>
    </div>
    <div class="wx-compact">
      <div>
        <div class="wx-temp" id="wxTemp">—°</div>
        <div class="wx-meta" style="text-align:left"><span id="wxDesc">—</span></div>
      </div>
      <div class="wx-icon" id="wxIcon">⛅</div>
      <div class="wx-meta">
        <b id="wxLoc">—</b>
        <span id="wxHiLo">H — / L —</span>
      </div>
    </div>
    <div class="wx-expanded">
     <div class="wx-alerts" id="wxAlerts"></div>
     <div class="wx-week" id="wxWeek"></div>
     <div class="wx-hourly" id="wxHourlyWrap">
       <div class="wx-hourly-label">Hourly</div>
       <div class="wx-hours" id="wxHours"></div>
     </div>
     <div class="wx-meta" style="text-align:left;font-size:12px;margin-bottom:4px">Radar</div>
     <div class="wx-radar" id="wxRadar"></div>
    </div>
  </div>

  <div class="card" id="cryptoCard">
    <div class="card-head">
      <div class="card-title">Crypto</div>
      <button class="card-action" id="cryptoRefresh">Refresh</button>
    </div>
    <div class="crypto-list" id="cryptoList"><div class="empty">Loading crypto…</div></div>
  </div>

  <!-- Shortcuts -->
  <div class="card">
    <div class="card-head">
      <div class="card-title">Apps</div>
    </div>
    <div class="shortcuts" id="shortcuts"></div>
  </div>

  <div class="version">Pulse v<span id="ver">0.1.10</span> · <span id="syncStatus">local</span></div>
</main>

<!-- NOTES -->
<main class="section stack" id="sec-notes">
  <div class="card">
    <div class="card-head">
      <div class="card-title">Quick Notes</div>
      <button class="card-action" id="newNote">+ New</button>
    </div>
    <div class="notes-list" id="notesList"></div>
  </div>
</main>

<!-- TIMERS -->
<main class="section stack" id="sec-timers">
  <div class="card">
    <div class="tabs">
      <button data-tab="alarm" class="active">Alarms</button>
      <button data-tab="timer">Timer</button>
      <button data-tab="remind">Reminders</button>
    </div>

    <div class="tab-pane" data-pane="alarm">
      <div class="alarm-list" id="alarmsList"></div>
      <div class="add-row"><button id="addAlarmBtn">+ New alarm</button></div>
    </div>

    <div class="tab-pane" data-pane="timer" style="display:none">
      <div class="timer-display" id="timerDisp">00:00</div>
      <div class="timer-controls">
        <button id="timerStart" class="primary">Start</button>
        <button id="timerReset">Reset</button>
      </div>
      <div class="timer-presets">
        <button data-sec="60">1m</button>
        <button data-sec="300">5m</button>
        <button data-sec="600">10m</button>
        <button data-sec="1500">25m</button>
        <button data-sec="1800">30m</button>
        <button data-sec="2700">45m</button>
        <button data-sec="3600">1h</button>
        <button data-sec="custom">Custom</button>
      </div>
      <div class="modal-row" style="margin-top:14px">
        <label>Sound</label>
        <select id="timerSound"></select>
      </div>
    </div>

    <div class="tab-pane" data-pane="remind" style="display:none">
      <div class="alarm-list" id="remindList"></div>
      <div class="add-row"><button id="addRemindBtn">+ New reminder</button></div>
    </div>
  </div>
</main>

<!-- Bottom nav -->
<nav class="nav">
  <button data-sec="home" class="active"><span class="ic">🏠</span>Home</button>
  <button data-sec="notes"><span class="ic">📝</span>Notes</button>
  <button data-sec="timers"><span class="ic">⏰</span>Timers</button>
</nav>

<!-- Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal"></div>
</div>

<!-- Firebase (compat builds — no bundler needed) -->
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>

<script>
/* ============================================================
   Pulse — single-file SPA
   v0.1.12
   ============================================================ */
const APP_VERSION = '0.1.12';
document.getElementById('ver').textContent = APP_VERSION;

/* ----- Firebase config -----
   Replace the placeholder values below with your actual web app
   config from Firebase Console → Project Settings → General →
   "Your apps" → Web (</>). The app works LOCAL-ONLY until then. */
const firebaseConfig = {
  apiKey: "AIzaSyDf-b3wQBsKw2tsBkenupz7b6hRrI5b-iU",
  authDomain: "ospulseport.firebaseapp.com",
  projectId: "ospulseport",
  storageBucket: "ospulseport.firebasestorage.app",
  messagingSenderId: "123244377813",
  appId: "1:123244377813:web:369ddda768df833c03545c",
  measurementId: "G-TTFG7CFHQX"
};

let fbApp=null, auth=null, db=null, user=null, online=false;
const hasConfig = !firebaseConfig.apiKey.startsWith('REPLACE_ME');

if (hasConfig) {
  try {
    fbApp = firebase.initializeApp(firebaseConfig);
    auth = firebase.auth();
    db = firebase.firestore();
    auth.onAuthStateChanged(u => {
      user = u;
      online = !!u && !u.isAnonymous;
      renderAuth();
      if (u) hydrateFromCloud();
    });
    auth.signInAnonymously().catch(e => console.warn('anon auth failed', e));
  } catch(e){ console.warn('Firebase init failed', e); }
}

/* ----- Local store (the source of truth, cloud syncs to it) ----- */
const LS = {
  get(k, d){ try{ return JSON.parse(localStorage.getItem('pulse:'+k)) ?? d; }catch{ return d; } },
  set(k, v){ localStorage.setItem('pulse:'+k, JSON.stringify(v)); },
};

function normalizeShortcuts(){
  const fallbackIcons = {
    Spotify: 'https://cdn.simpleicons.org/spotify/1DB954',
    YouTube: 'https://cdn.simpleicons.org/youtube/FF0000',
    TikTok: 'https://cdn.simpleicons.org/tiktok/000000',
    Maps: 'https://cdn.simpleicons.org/googlemaps/4285F4',
    Claude: CLAUDE_ICON,
    Hermes: HERMES_ICON,
    LinkedIn: LINKEDIN_ICON,
    Facebook: 'https://cdn.simpleicons.org/facebook/1877F2',
  };
  let changed = false;
  const shortcuts = (state.shortcuts || []).map(s => {
    if (!s) return s;
    if (s.label === 'Claude') return { ...s, iconSrc: fallbackIcons.Claude, icon: '🧠' };
    if (s.label === 'Hermes') return { ...s, iconSrc: fallbackIcons.Hermes, icon: '◉' };
    if (s.label === 'LinkedIn') return { ...s, iconSrc: fallbackIcons.LinkedIn };
    if (s.label === 'Facebook') return { ...s, iconSrc: fallbackIcons.Facebook };
    if (s.label === 'Spotify' && !s.iconSrc) return { ...s, iconSrc: fallbackIcons.Spotify };
    if (s.label === 'YouTube' && !s.iconSrc) return { ...s, iconSrc: fallbackIcons.YouTube };
    if (s.label === 'TikTok' && !s.iconSrc) return { ...s, iconSrc: fallbackIcons.TikTok };
    return s;
  });
  const has = (label) => shortcuts.some(s => s && s.label === label);
  if (!has('Spotify')) { shortcuts.push({ label:'Spotify', url:'https://open.spotify.com/', iconSrc:fallbackIcons.Spotify }); changed = true; }
  if (!has('YouTube')) { shortcuts.push({ label:'YouTube', url:'https://www.youtube.com/', iconSrc:fallbackIcons.YouTube }); changed = true; }
  if (!has('TikTok')) { shortcuts.push({ label:'TikTok', url:'https://www.tiktok.com/', iconSrc:fallbackIcons.TikTok }); changed = true; }
  if (!has('Maps')) { shortcuts.push({ label:'Maps', url:'https://maps.google.com', iconSrc:fallbackIcons.Maps }); changed = true; }
  if (!has('Claude')) { shortcuts.push({ label:'Claude', url:'https://claude.ai/', iconSrc:fallbackIcons.Claude }); changed = true; }
  if (!has('Hermes')) { shortcuts.push({ label:'Hermes', url:'https://t.me/', iconSrc:fallbackIcons.Hermes }); changed = true; }
  if (!has('LinkedIn')) { shortcuts.push({ label:'LinkedIn', url:'https://www.linkedin.com/', iconSrc:fallbackIcons.LinkedIn }); changed = true; }
  if (!has('Facebook')) { shortcuts.push({ label:'Facebook', url:'https://facebook.com/', iconSrc:fallbackIcons.Facebook }); changed = true; }
  state.shortcuts = shortcuts.filter(s => s.label !== 'Calendar' && s.label !== 'Gmail');
  if (changed) LS.set('shortcuts', state.shortcuts);
}
normalizeShortcuts();

/* ----- Cloud sync (per-user docs) ----- */
async function hydrateFromCloud(){
  if(!db || !user) return;
  const uid = user.uid;
  try {
    const doc = await db.collection('users').doc(uid).get();
    if (doc.exists){
      const d = doc.data();
      ['notes','events','alarms','reminders','shortcuts'].forEach(k=>{
        if(Array.isArray(d[k])) { state[k] = d[k]; LS.set(k, d[k]); }
      });
      renderAll();
      document.getElementById('syncStatus').textContent = online ? 'synced' : 'anon-cloud';
    }
  } catch(e){ console.warn('hydrate failed', e); }
}
let syncTimer=null;
function syncUp(key){
  if(!db || !user) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(async ()=>{
    try{
      await db.collection('users').doc(user.uid).set({
        [key]: state[key], updatedAt: Date.now()
      }, {merge:true});
      document.getElementById('syncStatus').textContent = online ? 'synced' : 'anon-cloud';
    }catch(e){ console.warn('sync failed', e); }
  }, 600);
}

const WX_CODES = {
  0:['Clear','☀️'], 1:['Mainly clear','🌤️'], 2:['Partly cloudy','⛅'], 3:['Overcast','☁️'],
  45:['Fog','🌫️'], 48:['Rime fog','🌫️'],
  51:['Drizzle','🌦️'], 53:['Drizzle','🌦️'], 55:['Drizzle','🌦️'],
  61:['Rain','🌧️'], 63:['Rain','🌧️'], 65:['Heavy rain','🌧️'],
  71:['Snow','🌨️'], 73:['Snow','🌨️'], 75:['Heavy snow','❄️'],
  77:['Snow grains','🌨️'],
  80:['Showers','🌦️'], 81:['Showers','🌦️'], 82:['Heavy showers','⛈️'],
  85:['Snow showers','🌨️'], 86:['Snow showers','❄️'],
  95:['Thunderstorm','⛈️'], 96:['Thunderstorm','⛈️'], 99:['Thunderstorm','⛈️'],
};
function wxDesc(c){ return (WX_CODES[c]||['—','❓'])[0]; }
function wxIcon(c){ return (WX_CODES[c]||['—','❓'])[1]; }

async function loadWeather(){
  let loc = state.loc;
  if (!loc) {
    loc = await new Promise(res=>{
      if (!navigator.geolocation) return res(null);
      navigator.geolocation.getCurrentPosition(
        p=>res({lat:p.coords.latitude, lon:p.coords.longitude, name:'Current location'}),
        ()=>res(null),
        {timeout:6000, maximumAge:600000}
      );
    });
    if (loc){ state.loc = loc; LS.set('loc', loc); }
  }
  if (!loc){
    document.getElementById('wxLoc').textContent = 'Tap to set location';
    document.getElementById('wxDesc').textContent = 'Location unavailable';
    return;
  }
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}`+
      `&current=temperature_2m,weather_code,relative_humidity_2m,wind_speed_10m`+
      `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,precipitation_sum,wind_speed_10m_max,sunrise,sunset`+
      `&hourly=temperature_2m,weather_code,precipitation_probability`+
      `&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto&forecast_days=10&forecast_hours=24`;
    const r = await fetch(url);
    const d = await r.json();
    const cur = d.current, day = d.daily;
    document.getElementById('wxTemp').textContent = Math.round(cur.temperature_2m)+'°';
    document.getElementById('wxDesc').textContent = wxDesc(cur.weather_code);
    document.getElementById('wxIcon').textContent = wxIcon(cur.weather_code);
    document.getElementById('wxLoc').textContent = loc.name || 'Local';
    document.getElementById('wxHiLo').textContent =
      `H ${Math.round(day.temperature_2m_max[0])}° / L ${Math.round(day.temperature_2m_min[0])}°`;
    const severeCodes = new Set([65, 82, 75, 86, 95, 96, 99]);
    const alerts = [];
    day.time.forEach((iso, i) => {
      const code = day.weather_code[i];
      if (severeCodes.has(code)) {
        const label = wxDesc(code);
        const when = new Date(iso + 'T00:00').toLocaleDateString(undefined, { weekday:'short', month:'short', day:'numeric' });
        alerts.push(`${when}: ${label}`);
      }
    });
    const alertWrap = document.getElementById('wxAlerts');
    alertWrap.innerHTML = alerts.length
      ? alerts.map(a => `<div class="wx-alert">${escapeHtml(a)}</div>`).join('')
      : '<div class="wx-alert">No severe alerts in the next 10 days.</div>';

    const fmt = (iso) => new Date(iso + 'T00:00').toLocaleDateString(undefined, { month:'short', day:'numeric' });
    const week = document.getElementById('wxWeek');
    week.innerHTML = day.time.map((iso,i)=>{
      const dt = new Date(iso+'T00:00');
      const wd = i===0 ? 'Today' : dt.toLocaleDateString(undefined,{weekday:'short'});
      const code = day.weather_code[i];
      return `<button class="wx-day" data-idx="${i}">
        <div class="wd">${wd}</div>
        <div class="we">${wxIcon(code)}</div>
        <div class="wt">${Math.round(day.temperature_2m_max[i])}°</div>
        <div class="wn">${Math.round(day.temperature_2m_min[i])}°</div>
      </button>`;
    }).join('');

    const hours = document.getElementById('wxHours');
    const hourly = d.hourly || {};
    const hourTimes = hourly.time || [];
    const now = new Date();
    const upcoming = hourTimes.map((iso, i) => ({
      iso,
      t: new Date(iso),
      temp: hourly.temperature_2m?.[i],
      code: hourly.weather_code?.[i],
      rain: hourly.precipitation_probability?.[i],
    })).filter(h => h.t >= now).slice(0, 12);
    hours.innerHTML = upcoming.length
      ? upcoming.map(h => `
        <div class="wx-hour">
          <div class="t">${h.t.toLocaleTimeString(undefined, { hour:'numeric' })}</div>
          <div class="i">${wxIcon(h.code)}</div>
          <div class="v">${Math.round(h.temp)}°</div>
        </div>`).join('')
      : '<div class="wx-alert" style="margin:0">Hourly unavailable.</div>';

    const showDetail = (i) => {
      const code = day.weather_code[i];
      const date = new Date(day.time[i] + 'T00:00');
      const dayName = i===0 ? 'Today' : date.toLocaleDateString(undefined,{weekday:'long'});
      const monthDay = date.toLocaleDateString(undefined,{month:'long', day:'numeric'});
      const sunrise = day.sunrise?.[i] ? new Date(day.sunrise[i]).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}) : '—';
      const sunset = day.sunset?.[i] ? new Date(day.sunset[i]).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}) : '—';
      const rain = day.precipitation_probability_max?.[i] ?? '—';
      const precip = day.precipitation_sum?.[i] ?? '—';
      const wind = day.wind_speed_10m_max?.[i] ?? '—';
      const detail = {
        title: `${dayName} · ${monthDay}`,
        rows: [
          ['Condition', wxDesc(code)],
          ['High / Low', `${Math.round(day.temperature_2m_max[i])}° / ${Math.round(day.temperature_2m_min[i])}°`],
          ['Rain chance', `${rain}%`],
          ['Precip', `${precip} in`],
          ['Wind', `${wind} mph`],
          ['Sunrise', sunrise],
          ['Sunset', sunset],
        ]
      };
      openModal(`
        <h3>${escapeHtml(detail.title)}</h3>
        <div class="modal-row" style="gap:10px">
          ${detail.rows.map(([k,v]) => `<div class="cal-event"><span>${escapeHtml(k)}</span><span class="when">${escapeHtml(String(v))}</span></div>`).join('')}
        </div>
        <div class="modal-actions"><button data-close class="primary">Close</button></div>
      `);
    };
    week.querySelectorAll('.wx-day').forEach(btn => {
      btn.addEventListener('click', () => showDetail(Number(btn.dataset.idx)));
    });

    const radar = document.getElementById('wxRadar');
    radar.innerHTML = `<iframe src="https://www.rainviewer.com/map.html?loc=${loc.lat},${loc.lon},7&oF=0&oC=0&oU=0&oA=1&sm=1&sn=1&fb=0&colour=1&lang=en&mini=1&locAcc=true" loading="lazy"></iframe>`;
  } catch(e){
    console.warn('weather fail', e);
  }
}

function renderCalendar(){
  const cur = state.calCursor;
  const year = cur.getFullYear(), month = cur.getMonth();
  const first = new Date(year, month, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();
  document.getElementById('calMonth').textContent =
    cur.toLocaleDateString(undefined,{month:'long', year:'numeric'});
  const today = new Date(); today.setHours(0,0,0,0);
  const grid = document.getElementById('calGrid');
  const dows = ['S','M','T','W','T','F','S'];
  let html = dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  // leading dim
  for (let i=startDow-1; i>=0; i--){
    html += `<div class="cal-cell dim">${daysInPrev-i}</div>`;
  }
  for (let d=1; d<=daysInMonth; d++){
    const dt = new Date(year, month, d);
    const iso = dt.toISOString().slice(0,10);
    const hasEv = state.events.some(e=>e.date===iso);
    const isToday = dt.getTime()===today.getTime();
    html += `<div class="cal-cell${isToday?' today':''}${hasEv?' has-event':''}" data-date="${iso}">${d}</div>`;
  }
  // trailing dim
  const cellsSoFar = startDow + daysInMonth;
  const trail = (7 - (cellsSoFar % 7)) % 7;
  for (let i=1; i<=trail; i++) html += `<div class="cal-cell dim">${i}</div>`;
  grid.innerHTML = html;
  grid.querySelectorAll('.cal-cell[data-date]').forEach(c=>{
    c.addEventListener('click', ()=> showEventsForDate(c.dataset.date));
  });
  // Today's events preview
  const todayIso = today.toISOString().slice(0,10);
  showEventsForDate(todayIso);
}
function showEventsForDate(iso){
  const list = state.events.filter(e=>e.date===iso).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const wrap = document.getElementById('calEvents');
  if (!list.length){
    wrap.innerHTML = `<div class="empty">No events ${iso===new Date().toISOString().slice(0,10)?'today':'on '+iso}</div>`;
    return;
  }
  wrap.innerHTML = list.map(e=>`
    <div class="cal-event">
      <div><b>${escapeHtml(e.title)}</b><div class="when">${e.time||'All day'}${e.notify?' · 🔔':''}</div></div>
      <button class="note-del" data-del-ev="${e.id}">×</button>
    </div>`).join('');
  wrap.querySelectorAll('[data-del-ev]').forEach(b=>{
    b.addEventListener('click', ()=>{
      state.events = state.events.filter(x=>x.id!==b.dataset.delEv);
      persist('events'); renderCalendar();
    });
  });
}

function renderNotes(){

  }
  list.innerHTML = state.notes.slice().sort((a,b)=>b.updated-a.updated).map(n=>`
    <div class="note" data-id="${n.id}">
      <textarea data-note="${n.id}" placeholder="Note…">${escapeHtml(n.text)}</textarea>
      <div class="note-foot">
        <span>${new Date(n.updated).toLocaleString()}</span>
        <button class="note-del" data-del="${n.id}">Delete</button>
      </div>
    </div>`).join('');
  list.querySelectorAll('textarea[data-note]').forEach(t=>{
    autoGrow(t);
    t.addEventListener('input', debounce(()=>{
      const n = state.notes.find(x=>x.id===t.dataset.note);
      if (!n) return;
      n.text = t.value; n.updated = Date.now();
      persist('notes');
      autoGrow(t);
    }, 300));
  });
  list.querySelectorAll('[data-del]').forEach(b=>{
    b.addEventListener('click', ()=>{
      state.notes = state.notes.filter(x=>x.id!==b.dataset.del);
      persist('notes'); renderNotes();
    });
  });
}

  { id:'urgent', name:'Urgent',        play:()=>pulse(1100, .15, 6) },
  { id:'silent', name:'Silent (vibrate only)', play:()=>{} },
];
const soundSel = document.getElementById('timerSound');
soundSel.innerHTML = SOUNDS.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
soundSel.addEventListener('change', ()=>{ state.timer.soundId = soundSel.value; SOUNDS.find(s=>s.id===soundSel.value).play(); });

let actx=null;
function ac(){ actx = actx || new (window.AudioContext||window.webkitAudioContext)(); return actx; }
function tone(f, dur){
  const a = ac(); const o = a.createOscillator(); const g = a.createGain();
  o.connect(g); g.connect(a.destination); o.frequency.value = f; o.type='sine';
  g.gain.setValueAtTime(0, a.currentTime);
  g.gain.linearRampToValueAtTime(.3, a.currentTime+.02);
  g.gain.exponentialRampToValueAtTime(.0001, a.currentTime+dur);
  o.start(); o.stop(a.currentTime+dur+.05);
}
function chord(freqs, dur){ freqs.forEach(f=>tone(f, dur)); }
function arp(freqs, step){ freqs.forEach((f,i)=> setTimeout(()=>tone(f,.3), i*step*1000)); }
function pulse(f, dur, n){ for(let i=0;i<n;i++) setTimeout(()=>tone(f,dur), i*(dur*1000+80)); }
function vibrate(p){ if (navigator.vibrate) navigator.vibrate(p); }
function fire(soundId){
  const s = SOUNDS.find(x=>x.id===soundId) || SOUNDS[0];
  s.play(); vibrate([200,100,200,100,400]);
}

// Alarms
function renderAlarms(){
  const list = document.getElementById('alarmsList');
  if (!state.alarms.length){ list.innerHTML = `<div class="empty">No alarms set.</div>`; return; }
  list.innerHTML = state.alarms.slice().sort((a,b)=>a.time.localeCompare(b.time)).map(a=>`
    <div class="alarm${a.enabled?'':' off'}" data-id="${a.id}">
      <div>
        <div class="time">${fmt12(a.time)}</div>
        <div class="label">${escapeHtml(a.label||'Alarm')} · ${SOUNDS.find(s=>s.id===a.sound)?.name||'Beep'}</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <button class="note-del" data-del-al="${a.id}">×</button>
        <div class="switch${a.enabled?' on':''}" data-toggle="${a.id}"></div>
      </div>
    </div>`).join('');
  list.querySelectorAll('[data-toggle]').forEach(s=>{
    s.addEventListener('click', ()=>{
      const a = state.alarms.find(x=>x.id===s.dataset.toggle); a.enabled = !a.enabled;
      persist('alarms'); renderAlarms();
    });
  });
  list.querySelectorAll('[data-del-al]').forEach(b=>{
    b.addEventListener('click', ()=>{
      state.alarms = state.alarms.filter(x=>x.id!==b.dataset.delAl);
      persist('alarms'); renderAlarms();
    });
  });
}
document.getElementById('addAlarmBtn').addEventListener('click', ()=>{
  openModal(`
    <h3>New alarm</h3>
    <div class="modal-row"><label>Time</label><input id="alTime" type="time" value="07:00"></div>
    <div class="modal-row"><label>Label</label><input id="alLabel" placeholder="Wake up"></div>
    <div class="modal-row"><label>Sound</label>
      <select id="alSound">${SOUNDS.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select></div>
    <div class="modal-actions">
      <button data-close>Cancel</button>
      <button class="primary" id="alSave">Save</button>
    </div>`);
  document.getElementById('alSave').addEventListener('click', ()=>{
    state.alarms.push({
      id: uid(), time: document.getElementById('alTime').value,
      label: document.getElementById('alLabel').value || 'Alarm',
      sound: document.getElementById('alSound').value, enabled:true,
    });
    persist('alarms'); closeModal(); renderAlarms();
  });
});

// Reminders
function renderReminders(){
  const list = document.getElementById('remindList');
  if (!state.reminders.length){ list.innerHTML = `<div class="empty">No reminders.</div>`; return; }
  const now = Date.now();
  list.innerHTML = state.reminders.slice().sort((a,b)=>a.at-b.at).map(r=>{
    const overdue = r.at < now && !r.done;
    return `<div class="alarm${r.done?' off':''}" data-id="${r.id}">
      <div>
        <div class="time" style="font-size:16px">${escapeHtml(r.text)}</div>
        <div class="label" style="color:${overdue?'var(--bad)':'var(--muted)'}">${new Date(r.at).toLocaleString()}${overdue?' · overdue':''}</div>
      </div>
      <button class="note-del" data-del-rm="${r.id}">×</button>
    </div>`;
  }).join('');
  list.querySelectorAll('[data-del-rm]').forEach(b=>{
    b.addEventListener('click', ()=>{
      state.reminders = state.reminders.filter(x=>x.id!==b.dataset.delRm);
      persist('reminders'); renderReminders();
    });
  });
}
document.getElementById('addRemindBtn').addEventListener('click', ()=>{
  const nowL = new Date(Date.now() - new Date().getTimezoneOffset()*60000).toISOString().slice(0,16);
  openModal(`
    <h3>New reminder</h3>
    <div class="modal-row"><label>What</label><input id="rmText" placeholder="Take meds"></div>
    <div class="modal-row"><label>When</label><input id="rmAt" type="datetime-local" value="${nowL}"></div>
    <div class="modal-actions">
      <button data-close>Cancel</button>
      <button class="primary" id="rmSave">Save</button>
    </div>`);
  document.getElementById('rmSave').addEventListener('click', ()=>{
    const text = document.getElementById('rmText').value.trim();
    const at = new Date(document.getElementById('rmAt').value).getTime();
    if (!text || !at) return;
    state.reminders.push({ id:uid(), text, at, done:false });
    persist('reminders'); closeModal(); renderReminders();
  });
});

// Alarm/reminder tick (every 20s)
let lastTickMin = '';
setInterval(()=>{
  const now = new Date();
  const hhmm = now.toTimeString().slice(0,5);
  if (hhmm !== lastTickMin){
    lastTickMin = hhmm;
    state.alarms.filter(a=>a.enabled && a.time===hhmm).forEach(a=>{
      fire(a.sound); notify(a.label || 'Alarm', `It's ${fmt12(a.time)}`);
    });
  }
  const t = now.getTime();
  state.reminders.filter(r=>!r.done && r.at<=t && r.at>t-60000).forEach(r=>{
    r.done = true; persist('reminders'); renderReminders();
    fire('chime'); notify('Reminder', r.text);
  });
  // Event notifications
  state.events.filter(e=>e.notify && !e._fired && e.time).forEach(e=>{
    const evDt = new Date(`${e.date}T${e.time}`).getTime();
    if (evDt <= t && evDt > t-60000){
      e._fired = true; persist('events');
      fire('gentle'); notify('Event', `${e.title} — now`);
    }
  });
}, 20000);

function notify(title, body){
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted'){
    new Notification(title, { body, icon:'/icon-192.png' });
  }
}

// Timer
let timerTick = null;
function renderTimer(){
  const r = state.timer.remaining;
  const m = Math.floor(r/60), s = r%60;
  document.getElementById('timerDisp').textContent =
    `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function timerStart(){
  if (state.timer.remaining<=0) return;
  state.timer.running = true;
  document.getElementById('timerStart').textContent = 'Pause';
  timerTick = setInterval(()=>{
    state.timer.remaining--;
    renderTimer();
    if (state.timer.remaining<=0){
      clearInterval(timerTick); timerTick=null; state.timer.running=false;
      document.getElementById('timerStart').textContent = 'Start';
      fire(state.timer.soundId); notify('Timer done', `${Math.round(state.timer.total/60)}m timer finished`);
    }
  }, 1000);
}
function timerPause(){
  clearInterval(timerTick); timerTick=null; state.timer.running=false;
  document.getElementById('timerStart').textContent = 'Start';
}
document.getElementById('timerStart').addEventListener('click', ()=>{
  if (state.timer.running) timerPause(); else timerStart();
});
document.getElementById('timerReset').addEventListener('click', ()=>{
  timerPause();
  state.timer.remaining = state.timer.total = 0; renderTimer();
});
document.querySelectorAll('.timer-presets button').forEach(b=>{
  b.addEventListener('click', ()=>{
    let s = b.dataset.sec;
    if (s==='custom'){
      const v = prompt('Minutes:', '15'); if (!v) return;
      s = Math.max(1, parseInt(v,10))*60;
    }
    timerPause();
    state.timer.remaining = state.timer.total = parseInt(s,10);
    renderTimer();
  });
});

/* ============================================================
   APPS
   ============================================================ */
function renderShortcuts(){
  const wrap = document.getElementById('shortcuts');
  wrap.innerHTML = state.shortcuts.map(s=>`
    <a class="sc" href="${s.url}" target="_blank" rel="noopener">
      ${s.iconSrc ? `<img class="iconimg" src="${s.iconSrc}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">` : `<div class="icon" style="display:${s.iconSrc ? 'none' : 'flex'}">${s.icon||'🔗'}</div>`}
      <div>${escapeHtml(s.label||'Link')}</div>
    </a>`).join('');
}

/* ============================================================
   NAV + MODAL + UTIL
   ============================================================ */
document.querySelectorAll('.nav button').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById('sec-'+b.dataset.sec).classList.add('active');
  });
});
function openModal(html){
  const m = document.getElementById('modal'); m.innerHTML = html;
  document.getElementById('modalBg').classList.add('open');
  m.querySelectorAll('[data-close]').forEach(b=>b.addEventListener('click', closeModal));
}
function closeModal(){ document.getElementById('modalBg').classList.remove('open'); }
document.getElementById('modalBg').addEventListener('click', e=>{
  if (e.target.id==='modalBg') closeModal();
});

function uid(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function debounce(fn, ms){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), ms); }; }
function autoGrow(t){ t.style.height='auto'; t.style.height=(t.scrollHeight+2)+'px'; }
function fmt12(hhmm){ if (!hhmm) return ''; const [h,m]=hhmm.split(':').map(Number);
  const p=h>=12?'PM':'AM'; const h12=((h+11)%12)+1; return `${h12}:${String(m).padStart(2,'0')} ${p}`; }

/* ----- Boot ----- */
function renderAll(){
  renderGreet(); renderAuth(); renderNotes();
  renderAlarms(); renderReminders(); renderShortcuts(); renderTimer();
}
renderAll();
loadWeather();
loadCrypto();
soundSel.value = state.timer.soundId;
if ('Notification' in window && Notification.permission === 'default'){
  // Ask politely after first interaction
  document.body.addEventListener('click', ()=>Notification.requestPermission(), { once:true });
}
// Service worker
if ('serviceWorker' in navigator){
  navigator.serviceWorker.register('/service-worker.js').catch(()=>{});
}
setInterval(renderGreet, 60000);
document.getElementById('cryptoRefresh').addEventListener('click', loadCrypto);
</script>
